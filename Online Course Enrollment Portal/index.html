<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Course Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Learning Portal</h1>
</header>

<main>

    <!-- Left Fieldset -->
    <fieldset>
        <legend>Course Enrollment Panel</legend>

        <h2>JavaScript Basics</h2>

        <p>Fee Per Seat:
            <strong>1000 Tk</strong>
        </p>

        <label>Number of Seats:</label>
        <input type="number" id="seatQty" value="1" min="1">

        <p>Total Course Fee:
            <span id="courseTotal">1000 Tk</span>
        </p>

        <p id="errorMsg" class="error"></p>

        <p id="discountMsg" class="discount"></p>

    </fieldset>


    <!-- Right Fieldset -->
    <fieldset>

        <legend>Enrollment Details Form</legend>

        <label>Full Name</label>
        <input type="text" id="name">

        <label>Contact Email</label>
        <input type="email" id="email">

        <label>Class Type</label>

        <select id="classType">
            <option value="100">Online Class</option>
            <option value="250">On-Campus Class</option>
        </select>

        <h3>
            Final Payable Amount:
            <span id="finalAmount">1100 Tk</span>
        </h3>

        <label>
            <input type="checkbox" id="confirm">
            I confirm my enrollment details are correct
        </label>

        <br><br>

        <button id="submitBtn">Submit</button>

    </fieldset>

</main>

<footer>
    All Rights Reserved 2026
</footer>

<script src="script.js"></script>

</body>
</html>
