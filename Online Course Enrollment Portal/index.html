<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Course Enrollment Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Learning Portal</h1>
</header>

<main class="container">

    <!-- Enrollment Panel -->
    <fieldset class="card">
        <legend>Course Enrollment Panel</legend>

        <h2>JavaScript Basics</h2>

        <div class="info-row">
            <span>Fee Per Seat</span>
            <strong>1000 Tk</strong>
        </div>

        <label for="seatQty">Number of Seats</label>
        <input type="number" id="seatQty" min="1" value="1">

        <div class="result">
            <strong>Total Course Fee:</strong>
            <span id="courseTotal">1000 Tk</span>
        </div>

        <p id="errorMsg" class="error"></p>
        <p id="discountMsg" class="discount"></p>

    </fieldset>

    <!-- Student Form -->
    <fieldset class="card">
        <legend>Enrollment Details Form</legend>

        <label for="fullName">Full Name</label>
        <input type="text" id="fullName">

        <label for="email">Contact Email</label>
        <input type="email" id="email">

        <label for="classType">Course Mode</label>
        <select id="classType">
            <option value="100">Online Class (+100 Tk)</option>
            <option value="250">On-Campus Class (+250 Tk)</option>
        </select>

        <div class="result">
            <strong>Final Payable Amount:</strong>
            <span id="finalAmount">1100 Tk</span>
        </div>

        <label class="checkbox">
            <input type="checkbox" id="confirm">
            I confirm my enrollment details are correct.
        </label>

        <button id="submitBtn">Submit Enrollment</button>

    </fieldset>

</main>

<footer>
    All Rights Reserved 2026
</footer>

<script src="script.js"></script>

</body>
</html>
